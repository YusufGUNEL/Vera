name: vera
description: "Vera - BTK Hackathon mobil uygulaması (Gemini destekli)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Gemini (Google Generative AI)
  google_generative_ai: ^0.4.6

  # Env / config
  flutter_dotenv: ^5.2.1

  # Typography
  google_fonts: ^6.2.1

  # Local storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # HTTP / network
  http: ^1.2.2

  # Firebase – core
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  firebase_storage: ^12.4.10
  google_sign_in: ^6.2.2

  # Firebase – P0 (güvenlik & push)
  firebase_messaging: ^15.2.5
  firebase_app_check: ^0.3.2+2

  # Firebase – P1 (izleme)
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.3

  # Firebase – P3 (feature flag)
  firebase_remote_config: ^5.4.4

  # Image picking (receipt OCR)
  image_picker: ^1.1.2

  # File picking (PDF/Excel statement import)
  file_picker: ^8.1.4

  # External app launching (deep-link to bank apps)
  url_launcher: ^6.3.1

  # Local notifications (fraud alert demo)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Voice input for Uma chat
  speech_to_text: ^7.0.0
  cloud_functions: ^5.6.2

  # Drag-and-drop file upload (web + desktop)
  desktop_drop: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/icon.png"
  adaptive_icon_background: "assets/branding/icon_background.png"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  min_sdk_android: 23

flutter_native_splash:
  color: "#1A1325"
  color_dark: "#1A1325"
  image: "assets/branding/splash_logo.png"
  image_dark: "assets/branding/splash_logo.png"
  android_12:
    image: "assets/branding/splash_logo.png"
    icon_background_color: "#7C3AED"
    color: "#1A1325"
  fullscreen: false
  android: true
  ios: false
